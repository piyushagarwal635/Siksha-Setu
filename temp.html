<div class="app-wrapper fade-in">
<nav class="navbar">
    <div class="nav-left">
        <button class="mobile-toggle sidebar-toggle d-lg-none border-0 bg-transparent me-2" (click)="toggleSidebar()">
          <i class="bi bi-list fs-3 text-dark"></i>
        </button>
        <img src="WhatsApp Image 2025-02-01 at 13.33.00_14d0087d.jpg" alt="Profile Picture">
        <span class="brand-text">Siksha Setu</span>
        <!-- Navigation Links (Hidden for ADMIN) -->
        <div class="nav-center d-none d-lg-flex" [class.open]="topMenuOpen" *ngIf="userRole !== 'ADMIN'">
            <a routerLink="/dashboard/main" routerLinkActive="active" (click)="toggleTopMenu()">Home</a>
            <a routerLink="/dashboard/courses" routerLinkActive="active" (click)="toggleTopMenu()">Courses</a>
            <a routerLink="/dashboard/resources" routerLinkActive="active" (click)="toggleTopMenu()">Resources</a>
            <a routerLink="/dashboard/about" routerLinkActive="active" (click)="toggleTopMenu()">About</a>
            <a routerLink="/dashboard/contact" routerLinkActive="active" (click)="toggleTopMenu()">Contact Support</a>
        </div>
    </div>
    <div class="nav-right">
      <div class="search">
        <input type="text" placeholder="Search...">
        <button><i class="bi bi-search"></i></button>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light rounded-pill shadow-sm fw-bold px-3 d-flex align-items-center gap-1" *ngIf="isLoggedIn && userRole === 'STUDENT'" (click)="goToStreak()" title="My Streak">
          <i class="bi bi-fire text-warning fs-5"></i>
          <span class="text-dark">{{ currentStreak }}</span>
        </button>
        <div class="position-relative d-inline-block" *ngIf="isLoggedIn">
          <div class="avatar-button" (click)="toggleMenu()" title="My Profile">
            <img
              [src]="profileImage || defaultAvatar"
              alt="User Avatar"
              class="rounded-circle shadow-sm border border-2 border-primary"
              style="width: 42px; height: 42px; cursor: pointer; object-fit: cover;"
            />
          </div>
        
          <div *ngIf="menuOpen" class="dropdown-menu show mt-3 position-absolute border-0" style="min-width: 16rem; right: 0; box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important; border-radius: 20px;">
            <div class="px-3 py-2 text-center border-bottom mb-2">
              <img [src]="profileImage || defaultAvatar" class="rounded-circle mb-2 border shadow-sm" style="width: 50px; height: 50px; object-fit: cover;" />
              <h6 class="fw-bold mb-0 text-dark">{{ userName }}</h6>
              <span class="badge bg-light text-secondary border mt-1">ID: {{ disabilityId }}</span>
            </div>
            
            <div class="px-2">
              <button class="btn btn-light w-100 text-start fw-semibold mb-2 py-2 px-3 border-0 rounded-3 text-dark d-flex align-items-center" (click)="goToProfile()">
                <i class="bi bi-person-fill text-primary me-2 fs-5"></i> My Profile
              </button>
              
              <label class="btn btn-light w-100 text-start fw-semibold mb-2 py-2 px-3 border-0 rounded-3 text-dark d-flex align-items-center cursor-pointer m-0">
                <i class="bi bi-camera-fill text-info me-2 fs-5"></i> Update Photo
                <input type="file" (change)="onFileSelected($event)" hidden />
              </label>
              
              <div *ngIf="profileImage && profileImage !== defaultAvatar" class="d-flex gap-2 mb-2">
                <button class="btn btn-light w-100 text-start fw-semibold py-2 px-3 border-0 rounded-3 text-danger d-flex align-items-center" (click)="removeProfileImage()">
                  <i class="bi bi-trash-fill me-2 fs-5"></i> Remove Photo
                </button>
              </div>
            </div>
            
            <hr class="my-2 border-light" />
            
            <div class="px-2 pb-1">
              <button class="btn btn-danger w-100 text-center fw-bold py-2 rounded-pill shadow-sm mt-1" (click)="logout()">
                <i class="bi bi-box-arrow-right me-1"></i> Sign Out
              </button>
            </div>
          </div>
        </div>

        <div *ngIf="!isLoggedIn">
          <button class="btn btn-primary text-white rounded-pill fw-bold px-4 shadow-sm" (click)="openLoginModal()">Login / Sign Up</button>
        </div>
      </div>
        <button class="mobile-toggle nav-toggle d-lg-none border-0 bg-transparent ms-2" (click)="toggleTopMenu()">
          <i class="bi bi-three-dots-vertical fs-3 text-dark"></i>
        </button>
      </div>
</nav>

<div class="main-layout">
  <!-- Mobile Overlay Mask -->
  <div class="sidebar-overlay d-lg-none" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>
  <div class="sidebar" [class.open]="sidebarOpen" *ngIf="isLoggedIn">
    <h2 class="sidebar-title">Navigation</h2>
    <button routerLink="main" class="sidebar-btn" *ngIf="!isLoggedIn">Home</button>
    <button routerLink="/dashboard/studentdashboard" class="sidebar-btn" *ngIf="isLoggedIn && userRole === 'STUDENT'">Student Dashboard</button>
    <button routerLink="/dashboard/admindashboard" class="sidebar-btn" *ngIf="isLoggedIn && userRole === 'ADMIN'">Admin Dashboard</button>

    <mat-accordion class="info-accordion">
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title><i class="bi bi-link-45deg"></i>&nbsp;&nbsp;Useful Links</mat-panel-title>
        </mat-expansion-panel-header>
        <p><a href="#">Academic Calendar</a></p>
        <p><a href="#">Online Resources</a></p>
        <p><a href="#">Educational Blog</a></p>
      </mat-expansion-panel>

      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title><i class="bi bi-question-circle"></i>&nbsp;&nbsp;FAQs</mat-panel-title>
        </mat-expansion-panel-header>
        <p>How to register for a course?</p>
        <p>What are the upcoming events?</p>
      </mat-expansion-panel>
    </mat-accordion>
  </div>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
  <div class="chatbot-icon" (click)="toggleChatbot()" title="Open AI Assistant">
    <i class="bi bi-robot"></i>
  </div>
  <div class="chatbot-popup" *ngIf="showChatbot">
    <iframe 
      src="https://cdn.botpress.cloud/webchat/v2.2/shareable.html?configUrl=https://files.bpcontent.cloud/2025/02/02/07/20250202073519-TKZMWKTW.json" 
      width="350px" 
      height="500px" 
      frameborder="0" 
      style="border: none; overflow: hidden;"
      title="chatbot">
    </iframe>
  </div>

</div>
</div>
<div *ngIf="showWarning" class="warning-overlay">
  <p>Please open as a desktop site.</p>
</div>
